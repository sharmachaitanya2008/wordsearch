<!DOCTYPE html>
<html lang="en">

<head>
    <link href="style.css" rel="stylesheet">
    <title>Login</title>
    <style>
        /* ---------- LOGIN PAGE ---------- */

        body {
            margin: 0;
            font-family: "Segoe UI", "Nunito", sans-serif;
            background: linear-gradient(135deg, #6ec6ff, #b388ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ---------- CARD ---------- */

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 35px;
            width: 320px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
            color: #333;
        }

        /* ---------- INPUTS ---------- */

        .card input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 20px;
            border: 2px solid #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: 0.2s ease;
            box-sizing: border-box;
        }

        .card input:focus {
            border-color: #7e57c2;
            box-shadow: 0 0 8px rgba(126, 87, 194, 0.4);
        }

        /* ---------- BUTTON ---------- */

        .card button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #ff9800, #ffb74d);
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s ease;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }

        .card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
        }

        .card button:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Login</h2>

        <input id="username" placeholder="Username">
        <input id="password" placeholder="Password" type="password">

        <button onclick="login()">Login</button>
    </div>

    <script src="app.js"></script>
    <script>
        async function login() {

            const data = await apiRequest("/auth/login", {
                method: "POST",
                body: JSON.stringify({
                    username: username.value,
                    password: password.value
                })
            });

            setTokens(data.accessToken, data.refreshToken);
            if (data.requirePasswordChange) {
                globalThis.location = "change-password.html";
            } else {
                globalThis.location = "game.html";
            }
        }
    </script>

</body>

</html>
